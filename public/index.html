<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎭 表情包生成器</title>
  <style>
    /* ========== 全局样式 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ========== 主容器 ========== */
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    /* ========== 文件上传区域 ========== */
    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 40px 20px;
      margin-bottom: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-area:hover,
    .upload-area.drag-over {
      border-color: #764ba2;
      background: #f0f2ff;
      transform: scale(1.02);
    }

    .upload-area.has-file {
      border-color: #4CAF50;
      background: #f0fff4;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .upload-text {
      color: #555;
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .upload-hint {
      color: #999;
      font-size: 0.85rem;
    }

    #fileInput {
      display: none;
    }

    .file-name {
      color: #4CAF50;
      font-weight: 600;
      margin-top: 10px;
      display: none;
    }

    .upload-area.has-file .file-name {
      display: block;
    }

    .upload-area.has-file .upload-icon,
    .upload-area.has-file .upload-text,
    .upload-area.has-file .upload-hint {
      display: none;
    }

    /* ========== 风格输入框 ========== */
    .input-group {
      margin-bottom: 25px;
      text-align: left;
    }

    .input-group label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .input-group input::placeholder {
      color: #aaa;
    }

    /* ========== 生成按钮 ========== */
    .generate-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ========== Loading 状态 ========== */
    .loading-container {
      display: none;
      padding: 40px 20px;
    }

    .loading-container.active {
      display: block;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #555;
      font-size: 1.1rem;
      font-weight: 500;
      min-height: 27px;
      transition: opacity 0.3s ease;
    }

    .loading-hint {
      color: #999;
      font-size: 0.9rem;
      margin-top: 15px;
    }

    /* ========== 结果展示区域 ========== */
    .result-container {
      display: none;
      margin-top: 30px;
    }

    .result-container.active {
      display: block;
    }

    .result-title {
      color: #333;
      font-size: 1.3rem;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .result-image {
      max-width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
    }

    .download-btn {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
    }

    .new-generation-btn {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-left: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .new-generation-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    /* ========== 错误提示 ========== */
    .error-container {
      display: none;
      padding: 20px;
      background: #ffe6e6;
      border: 2px solid #ff4444;
      border-radius: 10px;
      margin-top: 20px;
    }

    .error-container.active {
      display: block;
    }

    .error-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .error-text {
      color: #cc0000;
      font-size: 1rem;
      margin-bottom: 15px;
    }

    .retry-btn {
      padding: 10px 25px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .retry-btn:hover {
      background: #cc0000;
    }

    /* ========== 表单区域 ========== */
    .form-container {
      transition: opacity 0.3s ease;
    }

    .form-container.hidden {
      display: none;
    }

    /* ========== 响应式设计 ========== */
    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .upload-icon {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎭 表情包生成器</h1>
    <p class="subtitle">上传一张图片，AI 帮你变成有趣的表情包</p>

    <!-- 表单区域 -->
    <div class="form-container" id="formContainer">
      <!-- 文件上传区域 -->
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击选择图片或拖拽图片到此处</div>
        <div class="upload-hint">支持 JPG、PNG、WEBP 格式</div>
        <div class="file-name" id="fileName"></div>
        <input type="file" id="fileInput" accept="image/*">
      </div>

      <!-- 风格输入框 -->
      <div class="input-group">
        <label for="stylePrompt">风格提示词（可选）</label>
        <input 
          type="text" 
          id="stylePrompt" 
          placeholder="例如：赛博朋克、水墨画、像素风、卡通风格..."
        >
      </div>

      <!-- 生成按钮 -->
      <button class="generate-btn" id="generateBtn">
        ✨ 生成表情包
      </button>
    </div>

    <!-- Loading 状态 -->
    <div class="loading-container" id="loadingContainer">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">正在注入灵魂...</div>
      <div class="loading-hint">⏱️ 模型推理需要 30-60 秒，请耐心等待</div>
    </div>

    <!-- 结果展示区域 -->
    <div class="result-container" id="resultContainer">
      <h2 class="result-title">🎉 表情包生成成功！</h2>
      <img class="result-image" id="resultImage" alt="生成的表情包" />
      <div>
        <a class="download-btn" id="downloadBtn" download="meme.png">
          📥 下载表情包
        </a>
        <button class="new-generation-btn" id="newGenerationBtn">
          🔄 再做一个
        </button>
      </div>
    </div>

    <!-- 错误提示 -->
    <div class="error-container" id="errorContainer">
      <div class="error-icon">❌</div>
      <div class="error-text" id="errorText"></div>
      <button class="retry-btn" id="retryBtn">🔄 重试</button>
    </div>
  </div>

  <script>
    // ========== DOM 元素 ==========
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const stylePrompt = document.getElementById('stylePrompt');
    const generateBtn = document.getElementById('generateBtn');
    const formContainer = document.getElementById('formContainer');
    const loadingContainer = document.getElementById('loadingContainer');
    const loadingText = document.getElementById('loadingText');
    const resultContainer = document.getElementById('resultContainer');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const newGenerationBtn = document.getElementById('newGenerationBtn');
    const errorContainer = document.getElementById('errorContainer');
    const errorText = document.getElementById('errorText');
    const retryBtn = document.getElementById('retryBtn');

    // ========== 状态变量 ==========
    let selectedFile = null;
    let loadingTextIndex = 0;
    let loadingTextInterval = null;

    // ========== 加载文案轮换 ==========
    const loadingMessages = [
      '正在注入灵魂...',
      '大模型正在疯狂思考中，请稍等...',
      '正在绘制表情细节，这需要一点时间...',
      '别急，好的表情包值得等待...',
      '正在调用 qwen-image-edit 模型...',
      'AI 正在理解你的创意...',
      '正在添加夸张的表情效果...',
      '魔法正在发生，请稍候...'
    ];

    function startLoadingTextRotation() {
      loadingTextIndex = 0;
      loadingText.textContent = loadingMessages[0];
      
      loadingTextInterval = setInterval(() => {
        loadingTextIndex = (loadingTextIndex + 1) % loadingMessages.length;
        loadingText.textContent = loadingMessages[loadingTextIndex];
      }, 2500); // 每 2.5 秒切换一次
    }

    function stopLoadingTextRotation() {
      if (loadingTextInterval) {
        clearInterval(loadingTextInterval);
        loadingTextInterval = null;
      }
    }

    // ========== 文件上传处理 ==========
    uploadArea.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files[0]);
      }
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('drag-over');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('drag-over');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      
      if (e.dataTransfer.files.length > 0) {
        handleFileSelect(e.dataTransfer.files[0]);
      }
    });

    function handleFileSelect(file) {
      // 验证文件类型
      if (!file.type.startsWith('image/')) {
        showError('请选择图片文件');
        return;
      }

      selectedFile = file;
      fileName.textContent = `✓ 已选择：${file.name}`;
      uploadArea.classList.add('has-file');
      hideError();
    }

    // ========== 生成表情包 ==========
    generateBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        showError('请先上传一张图片');
        return;
      }

      // 准备上传
      const formData = new FormData();
      formData.append('image', selectedFile);
      
      const styleValue = stylePrompt.value.trim();
      if (styleValue) {
        formData.append('style_prompt', styleValue);
      }

      // 切换 UI 状态
      showLoading();

      try {
        const response = await fetch('/upload-and-generate', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '生成失败');
        }

        if (data.success) {
          showResult(data.imageUrl);
        } else {
          throw new Error(data.error || '生成失败');
        }

      } catch (error) {
        console.error('生成失败:', error);
        showError(error.message || '网络错误，请稍后重试');
      }
    });

    // ========== UI 状态切换 ==========
    function showLoading() {
      formContainer.classList.add('hidden');
      errorContainer.classList.remove('active');
      resultContainer.classList.remove('active');
      loadingContainer.classList.add('active');
      generateBtn.disabled = true;
      
      startLoadingTextRotation();
    }

    function showResult(imageUrl) {
      stopLoadingTextRotation();
      loadingContainer.classList.remove('active');
      resultContainer.classList.add('active');
      
      // 设置图片源
      resultImage.src = imageUrl;
      
      // 设置下载链接
      downloadBtn.href = imageUrl;
    }

    function showError(message) {
      stopLoadingTextRotation();
      loadingContainer.classList.remove('active');
      formContainer.classList.remove('hidden');
      errorContainer.classList.add('active');
      errorText.textContent = message;
      generateBtn.disabled = false;
    }

    function hideError() {
      errorContainer.classList.remove('active');
    }

    function resetForm() {
      resultContainer.classList.remove('active');
      formContainer.classList.remove('hidden');
      uploadArea.classList.remove('has-file');
      fileName.textContent = '';
      fileInput.value = '';
      stylePrompt.value = '';
      selectedFile = null;
      generateBtn.disabled = false;
      hideError();
    }

    // ========== 事件监听 ==========
    newGenerationBtn.addEventListener('click', resetForm);
    
    retryBtn.addEventListener('click', () => {
      hideError();
      generateBtn.click();
    });
  </script>
</body>
</html>
